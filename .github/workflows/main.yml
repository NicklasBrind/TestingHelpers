name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Pack
        if: github.event_name == 'release'
        run: |
          dotnet pack FluentResults.Extensions.AwesomeAssertions/src/FluentResults.Extensions.AwesomeAssertions -c Release --no-build -o ./nupkgs
          dotnet pack TestingHelpers.MassTransit.AwesomeAssertions/src/TestingHelpers.MassTransit.AwesomeAssertions -c Release --no-build -o ./nupkgs

      - name: Push to NuGet
        if: github.event_name == 'release'
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
